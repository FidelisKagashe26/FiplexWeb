name: FiplexWeb CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fiplexweb-production
  cancel-in-progress: true

jobs:
  build:
    name: Build Website
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.23.1"
          package-manager-cache: false

      - name: Allow scripts to run
        run: chmod +x scripts/*.sh

      - name: Install dependencies
        run: npm run install:ci

      - name: Build website
        run: npm run build

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s' "$VPS_SSH_KEY_B64" \
            | base64 --decode \
            > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H "$VPS_HOST" \
            >> ~/.ssh/known_hosts

          chmod 600 ~/.ssh/known_hosts

      - name: Deploy FiplexWeb
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -i ~/.ssh/id_ed25519 \
            "$VPS_USER@$VPS_HOST" \
            "/usr/local/sbin/deploy-fiplexweb"
